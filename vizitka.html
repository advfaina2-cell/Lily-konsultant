<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Фатыма Губайдуллина — Визитка</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0a;
      --surface: rgba(255, 255, 255, 0.06);
      --surface-strong: rgba(255, 255, 255, 0.12);
      --text: #f4f4f4;
      --muted: #c7c7c7;
      --accent: #6b63ff;
      --accent-soft: rgba(107, 99, 255, 0.16);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      background: radial-gradient(circle at top, rgba(107, 99, 255, 0.16) 0%, transparent 28%),
                  linear-gradient(180deg, #101010 0%, #080808 100%);
      color: var(--text);
      font-family: "Inter", "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    body {
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .card {
      position: relative;
      width: min(760px, 100%);
      padding: 40px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -30% -40% auto auto;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(107, 99, 255, 0.25), transparent 58%);
      filter: blur(30px);
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: auto auto -24px -24px;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.12), transparent 50%);
      filter: blur(24px);
      pointer-events: none;
    }

    .intro {
      display: grid;
      gap: 20px;
    }

    .title {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .name {
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 0.95;
      background: linear-gradient(120deg, #89f7fe 0%, #6b63ff 40%, #ff70d9 90%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 16px rgba(107, 99, 255, 0.35), 0 0 28px rgba(111, 95, 255, 0.18);
    }

    .tag {
      align-self: center;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--muted);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 66ch;
    }

    .details {
      display: grid;
      gap: 24px;
      margin-top: 28px;
    }

    .contact-card,
    .socials {
      display: grid;
      gap: 18px;
      padding: 24px;
      border-radius: 24px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
    }

    .contact-card p,
    .socials p {
      margin: 0;
    }

    .contact-row {
      display: grid;
      gap: 8px;
    }

    .contact-label {
      color: var(--muted);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .contact-value {
      font-size: 1.12rem;
      color: var(--text);
      word-break: break-word;
    }

    .social-list {
      display: grid;
      gap: 14px;
    }

    .social-link {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      color: var(--text);
      text-decoration: none;
      background: rgba(255,255,255,.03);
      border: 1px solid transparent;
      transition: transform .24s ease, background .24s ease, border-color .24s ease;
    }

    .social-link:hover,
    .social-link:focus-visible {
      transform: translateX(6px);
      background: rgba(107, 99, 255, 0.16);
      border-color: rgba(107, 99, 255, 0.32);
      outline: none;
    }

    .social-link svg {
      width: 28px;
      height: 28px;
      fill: var(--text);
      transition: transform .3s ease;
    }

    .social-link:hover svg {
      transform: scale(1.1);
      filter: drop-shadow(0 0 8px rgba(107, 99, 255, 0.45));
    }

    .social-text {
      display: grid;
      gap: 4px;
    }

    .social-title {
      font-size: 1rem;
      font-weight: 600;
    }

    .social-subtitle {
      font-size: 0.92rem;
      color: var(--muted);
    }

    .action-panel {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }

    .write-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 218px;
      padding: 16px 26px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #6b63ff, #ff70d9);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .24s ease, box-shadow .24s ease;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(107, 99, 255, 0.24);
    }

    .write-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.35), transparent 32%);
      opacity: 0;
      transition: opacity .3s ease;
    }

    .write-button:hover,
    .write-button:focus-visible {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 22px 50px rgba(107, 99, 255, 0.36);
      outline: none;
    }

    .write-button:hover::before,
    .write-button:focus-visible::before {
      opacity: 1;
    }

    .write-button span {
      position: relative;
      z-index: 1;
    }

    .pulse {
      position: absolute;
      inset: -20%;
      background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 35%);
      opacity: 0;
      animation: pulse 2.8s infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0% { transform: scale(0.92); opacity: 0.35; }
      60% { transform: scale(1.12); opacity: 0; }
      100% { transform: scale(1.22); opacity: 0; }
    }

    @media (max-width: 620px) {
      .card {
        padding: 28px 22px;
      }
      .contact-card,
      .socials {
        padding: 20px;
      }
      .action-panel {
        justify-content: stretch;
      }
      .write-button {
        width: 100%;
        min-width: auto;
      }
      .title {
        gap: 10px;
      }
    }
      .avatar-container {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    .avatar-container img {
      width: min(160px, 40vw);
      height: min(160px, 40vw);
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.16);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35), 0 0 0 1px rgba(107,99,255,0.12);
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02));
    }

</head>
<body>
  <section class="card" aria-label="Персональная визитка Фатымы Губайдуллиной">
    <div class="intro">
      <div class="title">
        <h1 class="name">Фатыма Губайдуллина</h1>
        <span class="tag">MLM-предприниматель</span>
      </div>
      <p class="subtitle">Создатель проекта <strong>Вайб+МЛМ</strong> — продвижение команды в интернете с помощью ИИ-инструментов. Готова помочь вам масштабировать личный бренд, привлекать лидов и развивать вашу команду.</p>
    </div>

    <div class="details">
      <div class="contact-card">
        <div class="contact-row">
          <p class="contact-label">Telegram</p>
          <p class="contact-value">@fatimka-30</p>
        </div>
      </div>

      <div class="socials">
        <div class="social-list">
          <a class="social-link" href="https://t.me/fatimka-30" target="_blank" rel="noreferrer noopener">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 2.01C6.48 2.01 2 6.49 2 11.99s4.48 9.98 10 9.98 10-4.48 10-9.98S17.52 2.01 12 2.01zm4.92 7.24l-1.32 6.26c-.10.45-.37.56-.76.35l-2.10-1.55-1.01.97c-.12.12-.22.22-.45.22l.16-2.30 4.19-3.78c.18-.15-.04-.24-.28-.09l-5.17 3.26-2.22-.69c-.48-.15-.49-.48.10-.70l8.70-3.35c.40-.16.76.10.63.71z" />
            </svg>
            <div class="social-text">
              <span class="social-title">Telegram</span>
              <span class="social-subtitle">Написать в мессенджер</span>
            </div>
          </a>
          <a class="social-link" href="#write" aria-label="Написать мне">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M20 4H4c-1.10 0-2 .90-2 2v12c0 1.10.90 2 2 2h16c1.10 0 2-.90 2-2V6c0-1.10-.90-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
            <div class="social-text">
              <span class="social-title">Сообщение</span>
              <span class="social-subtitle">Свяжитесь со мной</span>
            </div>
          </a>
        </div>
      </div>

      <div class="action-panel">
        <button class="write-button" id="writeButton" type="button">
          <span>Написать мне</span>
          <span class="pulse"></span>
        </button>
      </div>
    </div>
  </section>

  <script>
    const button = document.getElementById('writeButton');
    button.addEventListener('click', () => {
      window.location.href = 'https://t.me/fatimka-30';
    });
    button.addEventListener('mouseenter', () => {
      button.style.transform = 'scale(1.02) translateY(-1px)';
    });
    button.addEventListener('mouseleave', () => {
      button.style.transform = '';
    });
  </script>
</body>
</html>
